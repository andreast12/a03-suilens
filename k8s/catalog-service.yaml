apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2306259963
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: andreast12/catalog-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: catalog-db-url
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2306259963
spec:
  type: LoadBalancer
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
