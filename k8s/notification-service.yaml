apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: suilens-2306259963
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: andreast12/notification-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: notification-db-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: rabbitmq-url
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: suilens-2306259963
spec:
  type: LoadBalancer
  selector:
    app: notification-service
  ports:
    - port: 3003
      targetPort: 3003
