apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-2306259963
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: andreast12/order-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: order-db-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: rabbitmq-url
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3001
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-2306259963
spec:
  type: LoadBalancer
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
