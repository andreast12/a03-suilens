apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: catalog-db-pvc
  namespace: suilens-2306259963
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: suilens-2306259963
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: catalog-db
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: catalog
            - name: POSTGRES_PASSWORD
              value: catalog
            - name: POSTGRES_DB
              value: catalog
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: catalog-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: catalog-db-storage
          persistentVolumeClaim:
            claimName: catalog-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: suilens-2306259963
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432
